# secret.example.yaml — example Secret with placeholder values.
#
# DO NOT commit a copy of this file that contains real credentials.
# Apply manually:
#   kubectl apply -f secret.yaml -n weather
# Or seal real values with Sealed Secrets before committing:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# All keys map directly to the env vars consumed by the service.
apiVersion: v1
kind: Secret
metadata:
  name: weatherlink-bridge-secret
  namespace: weather
type: Opaque
stringData:
  WEATHERLINK__API_KEY: ""
  WEATHERLINK__API_SECRET: ""
  WEATHERLINK__STATION_ID: ""
  WUNDERGROUND__STATION_ID: ""
  WUNDERGROUND__PASSWORD: ""
  WINDY__STATION_ID: ""
  WINDY__PASSWORD: ""
