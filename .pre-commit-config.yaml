# weatherlink-bridge pre-commit configuration
# Mirrors the sp-rtk-base-relay pipeline: ruff+gitleaks on pre-commit,
# commitizen on commit-msg, mypy+pyright+pytest on pre-push.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.0.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        language: system
        entry: uv run mypy src
        pass_filenames: false
        stages: [pre-push]

      - id: pyright
        name: pyright (strict)
        language: system
        entry: uv run pyright src
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit tests
        language: system
        entry: uv run pytest tests/unit -q -x --no-cov
        pass_filenames: false
        stages: [pre-push]
